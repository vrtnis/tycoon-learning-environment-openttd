name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit:
    name: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[gymnasium,dev]"
      - name: Run tests
        run: pytest -q
